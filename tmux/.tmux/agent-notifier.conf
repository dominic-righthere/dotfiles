# Personal tmux-agent-notifier integration. Sourced from .tmux.conf only when
# ~/work/development/projects/tmux-agent-notifier exists (see the if-shell guard).
# Paths use $HOME (expanded at runtime by the shell in run-shell / #()).
set-hook -g after-select-window 'run-shell "$HOME/work/development/projects/tmux-agent-notifier/clear.sh #{session_name} #{window_index}"'
set -g @rose_pine_status_right_append_section '#($HOME/work/development/projects/tmux-agent-notifier/status.sh)'
bind-key N run-shell '$HOME/work/development/projects/tmux-agent-notifier/popup.sh'
bind-key J run-shell '$HOME/work/development/projects/tmux-agent-notifier/jump.sh'
bind-key K run-shell '$HOME/work/development/projects/tmux-agent-notifier/cycle.sh'
bind-key M run-shell '$HOME/work/development/projects/tmux-agent-notifier/agent-monitor.sh'
